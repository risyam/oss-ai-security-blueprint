services:
  vulnerable-app:
    build: .
    ports:
      - "8501:8501"
    environment:
      OLLAMA_BASE_URL: http://ollama-service:11434
    depends_on:
      - ollama-service
    volumes:
      - .:/app

  ollama-service:
    image: ollama/ollama:0.5.7
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 5 && ollama pull llama3 && wait"

volumes:
  ollama_data:
